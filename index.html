<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css?v=3.0">
    <title>Md. Faiyaz</title>
</head>
<body>

<nav>
    <div class="live-datetime-widget">

        <div class="analog-clock">
            <div class="hand hour" id="hour-hand"></div>
            <div class="hand minute" id="minute-hand"></div>
            <div class="hand second" id="second-hand"></div>
            <div class="center-dot"></div>
        </div>

        <div class="clock-info">
            <div id="day-display"></div>
            <div id="date-display"></div>
            <div id="digital-time"></div>
        </div>

    </div>

    <div class="nav-links">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Education</a>
        <a href="#">Career</a>
        <a href="#">Ink & Intellect</a>
        <a href="#">Contact</a>
    </div>
</nav>

<div class="container">
    <h1>Muhammad Faiyaz</h1>
    <p>Class IX Student — Calcutta, India</p>
</div>

<footer>
    © 2026 Muhammad Faiyaz
</footer>

<script>
function updateClock() {
    const now = new Date();

    const seconds = now.getSeconds();
    const minutes = now.getMinutes();
    const hours = now.getHours();

    const secondDeg = seconds * 6;
    const minuteDeg = minutes * 6 + seconds * 0.1;
    const hourDeg = (hours % 12) * 30 + minutes * 0.5;

    document.getElementById("second-hand").style.transform =
        `translateX(-50%) rotate(${secondDeg}deg)`;

    document.getElementById("minute-hand").style.transform =
        `translateX(-50%) rotate(${minuteDeg}deg)`;

    document.getElementById("hour-hand").style.transform =
        `translateX(-50%) rotate(${hourDeg}deg)`;

    document.getElementById("day-display").textContent =
        now.toLocaleDateString('en-US', { weekday: 'long' });

    document.getElementById("date-display").textContent =
        now.toLocaleDateString('en-US', { day: '2-digit', month: 'long', year: 'numeric' });

    document.getElementById("digital-time").textContent =
        String(hours).padStart(2, "0") + ":" +
        String(minutes).padStart(2, "0") + ":" +
        String(seconds).padStart(2, "0");
}

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
